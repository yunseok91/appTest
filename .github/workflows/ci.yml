name: CI/CD — Jest + Newman + EAS OTA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: CI — 타입체크 + 단위 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BaeBaeApp/package-lock.json

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps
        working-directory: BaeBaeApp

      - name: TypeScript 타입 체크
        run: npx tsc --noEmit
        working-directory: BaeBaeApp

      - name: Jest 단위 테스트 실행
        run: npm test -- --coverage --watchAll=false
        working-directory: BaeBaeApp

      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: BaeBaeApp/coverage/

  newman:
    name: CI — Newman API 테스트
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Newman + HTML 리포터 설치
        run: npm install -g newman newman-reporter-htmlextra

      - name: Newman 실행
        run: |
          newman run BaeBaeApp/docs/api-test/BaeBae-API-Tests.postman_collection.json \
            --environment BaeBaeApp/docs/api-test/BaeBae-API.postman_environment.json \
            --env-var "API_KEY=${{ secrets.FIREBASE_API_KEY }}" \
            --env-var "HOUSEHOLD_ID=${{ secrets.FIREBASE_HOUSEHOLD_ID }}" \
            --env-var "TEST_EMAIL=${{ secrets.FIREBASE_TEST_EMAIL }}" \
            --env-var "TEST_PASSWORD=${{ secrets.FIREBASE_TEST_PASSWORD }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export BaeBaeApp/docs/api-test/newman-report.html \
            --bail

      - name: Newman 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: BaeBaeApp/docs/api-test/newman-report.html

  deploy:
    name: CD — OTA 배포
    runs-on: ubuntu-latest
    needs: [test, newman]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BaeBaeApp/package-lock.json

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps
        working-directory: BaeBaeApp

      - name: EAS OTA 배포
        working-directory: BaeBaeApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli update \
            --branch preview \
            --message "Auto deploy: ${{ github.event.head_commit.message }}" \
            --non-interactive

      - name: Slack 배포 완료 알림
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *BaeBaeApp OTA 배포 완료*\n커밋: `${{ github.event.head_commit.message }}`\n브랜치: `${{ github.ref_name }}`\n작성자: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 배포 실패 알림
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ *BaeBaeApp 배포 실패*\n커밋: `${{ github.event.head_commit.message }}`\n작성자: ${{ github.actor }}\n확인: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
