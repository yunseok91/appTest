name: EAS OTA Update

on:
  push:
    branches:
      - main
    paths:
      - 'BaeBaeApp/**'

jobs:
  ci:
    name: CI — 검사
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BaeBaeApp/package-lock.json

      - name: Install dependencies
        working-directory: BaeBaeApp
        run: npm ci --legacy-peer-deps

      - name: 타입 검사 (TypeScript)
        working-directory: BaeBaeApp
        run: npm run typecheck

      - name: 단위 테스트 (Jest)
        working-directory: BaeBaeApp
        run: npm run test

  deploy:
    name: CD — OTA 배포
    runs-on: ubuntu-latest
    needs: ci                    # ci 잡이 통과해야만 실행

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BaeBaeApp/package-lock.json

      - name: Install dependencies
        working-directory: BaeBaeApp
        run: npm ci --legacy-peer-deps

      - name: EAS Update
        working-directory: BaeBaeApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli update \
            --branch preview \
            --message "Auto deploy: ${{ github.event.head_commit.message }}" \
            --non-interactive
